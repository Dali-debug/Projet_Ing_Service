<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <div class="logo-container">
        <span class="logo-icon">🏒</span>
      </div>
      <h1>JINEN</h1>
      <p>Gestion de Garderie</p>
    </div>

    <div class="auth-toggle">
      <button [class.active]="isLogin" (click)="isLogin = true; errorMessage = ''">Connexion</button>
      <button [class.active]="!isLogin" (click)="isLogin = false; errorMessage = ''">Inscription</button>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <span>⚠️</span> {{ errorMessage }}
    </div>

    <!-- Login Form -->
    <form *ngIf="isLogin" (ngSubmit)="onLogin()" class="auth-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" [(ngModel)]="loginEmail" name="loginEmail"
               placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" [(ngModel)]="loginPassword" name="loginPassword"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary submit-btn" [disabled]="isLoading">
        <span class="spinner" *ngIf="isLoading"></span>
        {{ isLoading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <!-- Register Form -->
    <form *ngIf="!isLogin" (ngSubmit)="onRegister()" class="auth-form">
      <div class="user-type-selector">
        <button type="button" [class.active]="registerType === 'parent'"
                (click)="registerType = 'parent'">
          <span>👨‍👩‍👧</span> Parent
        </button>
        <button type="button" [class.active]="registerType === 'nursery'"
                (click)="registerType = 'nursery'">
          <span>🏢</span> Propriétaire
        </button>
      </div>
      <div class="form-group">
        <label for="reg-name">Nom complet</label>
        <input type="text" id="reg-name" [(ngModel)]="registerName" name="registerName"
               placeholder="Votre nom" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" [(ngModel)]="registerEmail" name="registerEmail"
               placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label for="reg-phone">Téléphone</label>
        <input type="tel" id="reg-phone" [(ngModel)]="registerPhone" name="registerPhone"
               placeholder="+216 XX XXX XXX">
      </div>
      <div class="form-group">
        <label for="reg-password">Mot de passe</label>
        <input type="password" id="reg-password" [(ngModel)]="registerPassword" name="registerPassword"
               placeholder="Au moins 6 caractères" required>
      </div>
      <button type="submit" class="btn btn-primary submit-btn" [disabled]="isLoading">
        <span class="spinner" *ngIf="isLoading"></span>
        {{ isLoading ? 'Inscription...' : 'S\'inscrire' }}
      </button>
    </form>

    <div class="auth-footer">
      <a routerLink="/welcome">← Retour à l'accueil</a>
    </div>
  </div>
</div>
