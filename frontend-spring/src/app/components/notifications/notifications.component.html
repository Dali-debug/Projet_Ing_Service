<div class="page">
  <div class="page-header">
    <div class="header-flex">
      <div>
        <h1>🔔 Notifications</h1>
        <p>Vos notifications récentes</p>
      </div>
      <button class="btn btn-outline" (click)="markAllAsRead()" *ngIf="notifications.length > 0">
        Tout marquer comme lu
      </button>
    </div>
  </div>
  <div class="page-content">
    <div class="loading-spinner" *ngIf="isLoading"><div class="spinner"></div></div>
    <ng-container *ngIf="!isLoading">
      <div class="notification-list" *ngIf="notifications.length > 0">
        <div class="notification-item" *ngFor="let notif of notifications"
             [class.unread]="!notif.isRead" (click)="markAsRead(notif.id)">
          <div class="notif-icon">{{ notif.type === 'enrollment' ? '📋' : notif.type === 'message' ? '💬' : '🔔' }}</div>
          <div class="notif-content">
            <p class="notif-message">{{ notif.message }}</p>
            <span class="notif-time">{{ getTimeAgo(notif.createdAt) }}</span>
          </div>
          <button class="delete-btn" (click)="deleteNotification(notif.id); $event.stopPropagation()">✕</button>
        </div>
      </div>
      <div class="empty-state" *ngIf="notifications.length === 0">
        <span class="icon">🔔</span>
        <h3>Aucune notification</h3>
        <p>Vous êtes à jour !</p>
      </div>
    </ng-container>
  </div>
</div>
