version: '3.8'

services:
  # ─── MongoDB (local dev) ──────────────────────────────────────────────────
  # Remove or comment this out when using MongoDB Atlas – just set MONGODB_URI
  mongodb:
    image: mongo:7-jammy
    container_name: nursery_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # ─── Spring Boot backend ─────────────────────────────────────────────────
  backend:
    image: eclipse-temurin:17-jdk-alpine
    container_name: nursery_backend
    working_dir: /app
    volumes:
      - ./backend-spring:/app
      - maven_cache:/root/.m2
    environment:
      # To use MongoDB Atlas, set this variable:
      # MONGODB_URI: mongodb+srv://<user>:<password>@<cluster>.mongodb.net/nursery_db
      MONGODB_URI: mongodb://mongodb:27017/nursery_db
    ports:
      - "3000:3000"
    command: sh -c "chmod +x mvnw && ./mvnw spring-boot:run -DskipTests"
    depends_on:
      - mongodb
    restart: unless-stopped

  # ─── Legacy Node.js backend (kept for reference, not started by default) ──
  backend-node:
    image: node:18-alpine
    container_name: nursery_backend_node
    working_dir: /usr/src/app
    profiles:
      - legacy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3001:3000"
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

volumes:
  mongodb_data:
  maven_cache:
